spring.application.name=homelab-backend
spring.servlet.multipart.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://${DB_URL}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLoggingListener=OFF
logging.level.org.springframework.boot.autoconfigure=INFO
# JDK-internal JMX/RMI plumbing (hit on every ManagementFactory poll, e.g. TelemetryService's CPU/heap
# reads) - pure JVM noise, never useful at any app log level, so it's floored regardless of the
# DEBUG/INFO/... toggle set via FrameworkLogLevelService.
logging.level.sun.rmi=WARN
logging.level.javax.management=WARN
# Hibernate/Spring-JDBC/connection-pool internals (transaction lifecycle, SQL AST tree dumps, pool
# housekeeping, raw driver calls) - never useful, floored regardless of the toggle. The actual SQL
# statement text (org.hibernate.SQL) is re-enabled dynamically in FrameworkLogLevelService so it
# still follows the DEBUG/INFO/... toggle on its own, same as show-sql used to always show it.
logging.level.org.hibernate=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.jdbc=WARN
logging.level.org.postgresql.jdbc=WARN
logging.level.com.zaxxer.hikari=WARN
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=52428800