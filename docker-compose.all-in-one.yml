# Déploiement "tout-en-un" : frontend + backend + Postgres dans un seul
# conteneur/une seule image. Alternative à docker-compose.yml (services séparés).
#
#   docker compose -f docker-compose.all-in-one.yml up -d --build
#
# Les données Postgres sont conservées sur le volume `db-data` : le conteneur
# peut être supprimé/recréé sans perte de données.
services:
  homelab:
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
    container_name: homelab-all-in-one
    ports:
      - "80:80"
    env_file:
      - .env.all-in-one
    volumes:
      - db-data:/var/lib/postgresql/data
      # fichiers écrits par l'app elle-même (uploads de modules, icône du homelab, ...) : doit
      # être un volume nommé, sans quoi ils sont perdus à chaque recréation du conteneur (pas
      # juste un redémarrage), voir HomelabConfig.storagePath
      - app-storage:/data
      - ./modules:/app_root/modules:ro
      # requis par OSHI pour identifier le vrai OS hôte (CPU/RAM/disque sont
      # déjà identiques dans le conteneur sous Docker Desktop/WSL2, donc pas
      # besoin de monter /proc et /sys en plus)
      - /etc/os-release:/host/etc/os-release:ro
      # monté en lecture/écriture : le panel admin (Limites de ressources) réécrit
      # JAVA_XMX_GB dedans directement, voir HOMELAB_ENV_FILE_PATH ci-dessous
      - ./.env.all-in-one:/app_root/.env:rw
      # permet au panel admin (bouton Redémarrer) de demander à Docker de
      # redémarrer ce conteneur depuis l'intérieur, voir SystemRestartService
      - //var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Doshi.os.windows.osRelease.path=/host/etc/os-release
      - HOMELAB_ENV_FILE_PATH=/app_root/.env
      - HOMELAB_STORAGE_PATH=/data
      # -Xmx n'est PAS fixé ici : entrypoint.sh le lit directement depuis le .env monté à chaque
      # démarrage (restart inclus), voir docker/all-in-one/entrypoint.sh et ResourceLimitsService.
    restart: unless-stopped

volumes:
  db-data:
  app-storage:
