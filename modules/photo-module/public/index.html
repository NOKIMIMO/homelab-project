<!DOCTYPE html>
<html lang="fr" data-theme="night">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Drive</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--fallback-b1, oklch(var(--b1)));
        }

        .photo-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .photo-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .photo-overlay {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .photo-card:hover .photo-overlay {
            opacity: 1;
        }

        #fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        #fullscreen-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fullscreen-overlay.active {
            display: flex;
            opacity: 1;
        }

        #fullscreen-overlay.active #fullscreen-img {
            transform: scale(1);
        }
    </style>
</head>

<body class="p-4 md:p-10 text-base-content font-sans">
    <div class="max-w-7xl mx-auto flex flex-col h-full">
        <header
            class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-8 bg-base-100/50 p-6 rounded-3xl backdrop-blur-xl shadow-xl border border-base-content/5">
            <div class="flex items-center gap-4">
                <div class="bg-primary/20 p-3 rounded-2xl"><i data-lucide="camera" class="w-8 h-8 text-primary"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight">Homelab Gallery</h1>
                    <p class="text-base-content/50 text-sm font-medium">Vos souvenirs, triés par date</p>
                </div>
            </div>
            <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                <select id="sort-order" class="select select-bordered select-sm rounded-full">
                    <option value="desc">Plus récent</option>
                    <option value="asc">Plus ancien</option>
                </select>
                <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
                <button id="upload-btn"
                    class="btn btn-primary btn-sm md:btn-md shadow-lg shadow-primary/30 rounded-full px-6 gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Importer
                </button>
            </div>
        </header>

        <div id="loading" class="flex-1 flex items-center justify-center min-h-[400px]">
            <span class="loading loading-spinner text-primary w-12 h-12"></span>
        </div>

        <div id="gallery-container" class="hidden pb-20"></div>

        <div id="empty-state"
            class="hidden flex-1 flex flex-col items-center justify-center min-h-[400px] bg-base-100/20 rounded-[40px] border-4 border-dashed border-base-content/5">
            <div class="bg-base-content/5 p-8 rounded-full mb-6"><i data-lucide="image"
                    class="w-16 h-16 text-base-content/10"></i></div>
            <h3 class="text-2xl font-bold text-base-content/40">Aucune photo</h3>
            <p class="text-base-content/30 mt-2">Importez vos fichiers pour commencer.</p>
        </div>
    </div>

    <div id="fullscreen-overlay">
        <button id="close-fullscreen"
            class="absolute top-6 right-6 btn btn-circle btn-ghost text-white/50 hover:text-white"><i data-lucide="x"
                class="w-6 h-6"></i></button>
        <button id="delete-fullscreen"
            class="absolute bottom-10 right-10 btn btn-error text-white gap-2 shadow-2xl rounded-2xl px-6">
            <i data-lucide="trash-2" class="w-5 h-5"></i> Supprimer
        </button>
        <img id="fullscreen-img" src="" alt="View" />
    </div>

    <dialog id="delete_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box border border-base-content/10">
            <h3 class="font-bold text-lg flex items-center gap-2 text-error"><i data-lucide="alert-triangle"
                    class="w-6 h-6"></i> Confirmation</h3>
            <p class="py-4 text-base-content/70">Supprimer définitivement cette photo ?</p>
            <div class="modal-action">
                <form method="dialog" class="flex gap-2">
                    <button class="btn btn-ghost">Annuler</button>
                    <button id="confirm-delete-btn" class="btn btn-error text-white px-8">Supprimer</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script>
        lucide.createIcons();
        const galleryContainer = document.getElementById('gallery-container');
        const loading = document.getElementById('loading');
        const emptyState = document.getElementById('empty-state');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const sortOrder = document.getElementById('sort-order');
        const fullscreenOverlay = document.getElementById('fullscreen-overlay');
        const fullscreenImg = document.getElementById('fullscreen-img');
        const closeFullscreenBtn = document.getElementById('close-fullscreen');
        const deleteFullscreenBtn = document.getElementById('delete-fullscreen');
        const deleteModal = document.getElementById('delete_modal');
        const confirmDeleteBtn = document.getElementById('confirm-delete-btn');

        let currentActiveId = null;
        let allPhotos = [];
        let filenameToDelete = null;

        async function loadPhotos() {
            loading.classList.remove('hidden');
            galleryContainer.classList.add('hidden');
            emptyState.classList.add('hidden');
            try {
                const res = await fetch('api/photos');
                allPhotos = await res.json();
                loading.classList.add('hidden');
                if (allPhotos.length === 0) emptyState.classList.remove('hidden');
                else { galleryContainer.classList.remove('hidden'); renderGallery(); }
            } catch (err) { loading.innerHTML = `<p class="text-error">Error</p>`; }
        }

        function groupPhotos(photos) {
            const groups = {};
            photos.forEach(p => {
                const d = new Date(Number(p.date));
                const key = isNaN(d.getTime()) ? "Inconnue" : d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
                if (!groups[key]) groups[key] = [];
                groups[key].push(p);
            });
            return groups;
        }

        function renderGallery() {
            const order = sortOrder.value;
            const sorted = [...allPhotos].sort((a, b) => order === 'desc' ? b.date - a.date : a.date - b.date);
            const groups = groupPhotos(sorted);
            galleryContainer.innerHTML = Object.keys(groups).map(date => `
                <div class="mb-12">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-3 text-base-content/80">
                        <span class="w-2 h-2 rounded-full bg-primary ring-4 ring-primary/20"></span> ${date}
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        ${groups[date].map(p => {
                const escN = p.name.replace(/'/g, "\\'");
                const escU = p.url.replace(/'/g, "\\'");
                return `
                                <div class="photo-card relative group aspect-square rounded-[24px] overflow-hidden bg-base-200 cursor-pointer border border-base-content/5 shadow-lg">
                                    <img src="${p.url}" alt="img" class="w-full h-full object-cover" loading="lazy" onclick="openFullscreen('${escU}', '${escN}')" />
                                    <div class="absolute top-3 right-3 z-20">
                                         <button onclick="event.stopPropagation(); deletePhoto('${escN}')" class="btn btn-circle btn-xs btn-error opacity-0 group-hover:opacity-100 transition-all shadow-xl">
                                            <i data-lucide="trash-2" class="w-3.5 h-3.5 text-white"></i>
                                        </button>
                                    </div>
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        sortOrder.addEventListener('change', renderGallery);
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            if (!e.target.files.length) return;
            uploadBtn.disabled = true;
            for (const f of e.target.files) {
                const fd = new FormData(); fd.append('photo', f);
                try { await fetch('api/photos', { method: 'POST', body: fd }); } catch (err) { }
            }
            uploadBtn.disabled = false;
            fileInput.value = '';
            loadPhotos();
        });

        async function deletePhoto(n) { filenameToDelete = n; deleteModal.showModal(); }
        confirmDeleteBtn.addEventListener('click', async () => {
            if (!filenameToDelete) return;
            const res = await fetch(`api/photos/${encodeURIComponent(filenameToDelete)}`, { method: 'DELETE' });
            if (res.ok) { if (currentActiveId === filenameToDelete) closeFullscreen(); loadPhotos(); }
            filenameToDelete = null;
        });

        window.deletePhoto = deletePhoto;
        window.openFullscreen = (u, n) => { currentActiveId = n; fullscreenImg.src = u; fullscreenOverlay.classList.add('active'); };
        window.closeFullscreen = () => { fullscreenOverlay.classList.remove('active'); setTimeout(() => { fullscreenImg.src = ''; currentActiveId = null; }, 300); };
        closeFullscreenBtn.addEventListener('click', closeFullscreen);
        fullscreenOverlay.addEventListener('click', (e) => { if (e.target === fullscreenOverlay) closeFullscreen(); });
        deleteFullscreenBtn.addEventListener('click', () => { if (currentActiveId) deletePhoto(currentActiveId); });
        loadPhotos();
    </script>
</body>

</html>
