services:
  photo-module:
    image: node:20-alpine
    container_name: photo-module-dev
    working_dir: /app
    command: sh -c "npm i && npm run dev"
    environment:
      - NODE_ENV=development
      - DB_HOST=${DB_HOST:-homelab-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME:-homelab_user}
      - DB_PASSWORD=${DB_PASSWORD:-homelab_password}
      - DB_DATABASE=${DB_DATABASE:-photo_module}
      - CORE_DB_DATABASE=${CORE_DB_DATABASE:-homelab}
    ports:
      - "8081:8081"
      - "5173:5173"
    volumes:
      - ${MODULE_HOST_PATH:-.}:/app
      - /app/node_modules
      - ${PHOTO_STORAGE_PATH:-./data/storage}:/app/public/storage
    restart: unless-stopped
    networks:
      - homelab-network
      - db-network

networks:
  homelab-network:
    external: true
    name: homelab-network
  db-network:
    external: true
    name: db-network
