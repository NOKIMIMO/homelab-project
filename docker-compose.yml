services:
  homelab-backend:
    build: ./homelab-backend
    container_name: homelab-backend
    ports:
      - "8080:8080"
    depends_on:
      - homelab-db
    env_file:
      - .env.production
    volumes:
      - /proc:/host/proc:ro # read-only mount of proc for oshi : CPU and memory info
      - /sys:/host/sys:ro # read-only mount of sys for oshi : CPU and memory info
      - /etc/os-release:/host/etc/os-release:ro # read-only mount of os-release for oshi : OS info
      - //var/run/docker.sock:/var/run/docker.sock 
      - .:/app_root:ro #read-only mount of the current direct for modules discovery
    environment:
      - JAVA_OPTS=-Doshi.os.windows.proc.path=/host/proc -Doshi.os.windows.sys.path=/host/sys -Doshi.os.windows.osRelease.path=/host/etc/os-release
    restart: unless-stopped
    networks:
      - homelab-network
      - db-network

  homelab-db:
    image: postgres:16-alpine
    container_name: homelab-db
    env_file:
      - .env.production
    environment:
      - POSTGRES_DB=homelab
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - db-network
    restart: unless-stopped

  homelab-frontend:
    build: ./homelab-frontend
    container_name: homelab-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - homelab-network

  # Self-hosted push relay for mobile alert notifications (UnifiedPush distributor target).
  # No auth token configured: the per-device endpoint URL (a random slug ntfy generates on
  # registration) is itself the capability/secret, so only the mobile device that registered
  # it can be pushed to as long as that URL isn't leaked. If this is exposed on a public
  # hostname, harden with NTFY_AUTH_DEFAULT_ACCESS=deny-all + NTFY_ENABLE_SIGNUP=false.
  homelab-ntfy:
    image: binwiederhier/ntfy
    container_name: homelab-ntfy
    command:
      - serve
    environment:
      - TZ=UTC
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_BEHIND_PROXY=true
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/etc/ntfy
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - homelab-network

networks:
  homelab-network:
    name: homelab-network
  db-network:
    name: db-network

volumes:
  db-data:
  ntfy-cache:
  ntfy-data:
