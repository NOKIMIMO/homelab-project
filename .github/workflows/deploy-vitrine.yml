name: Deploy vitrine to Cloudflare Workers

on:
  push:
    branches: [master, pipeline]
    paths:
      - 'vitrine/**'
      - '.github/workflows/deploy-vitrine.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vitrine/package-lock.json

      - name: Install dependencies
        working-directory: vitrine
        run: npm ci

      - name: Build
        working-directory: vitrine
        run: npm run build

      - name: Deploy preview version
        if: github.ref == 'refs/heads/pipeline'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: vitrine
          command: versions upload

      - name: Deploy to production
        if: github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: vitrine
          command: deploy --commit-dirty=true
