spring:
  application:
    name: HomeStock
  # Pour charger les variables du .env en local, utilisez un loader .env ou exportez les variables avant de lancer l'app.
  datasource:
    url: jdbc:postgresql://${DB_HOST:${CORE_DB_HOST:localhost}}:${DB_PORT:${CORE_DB_PORT:5432}}/${DB_DATABASE:homeStock}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
