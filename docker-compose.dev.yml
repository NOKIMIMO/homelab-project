services:
  homelab-backend-dev:
    build:
      context: ./homelab-backend
      dockerfile: Dockerfile.dev
    container_name: homelab-backend-dev
    working_dir: /app
    volumes:
      - ./homelab-backend:/app
      - //var/run/docker.sock:/var/run/docker.sock
      - .:/app_root:ro
      - gradle-cache:/home/gradle/.gradle
    environment:
      - HOMELAB_APP_ROOT=/app_root
      - HOMELAB_MODULES_SCAN_PATH=/app_root/modules
    ports:
      - "8080:8080"
    networks:
      homelab-network:
        aliases:
          - homelab-backend
    stop_grace_period: 30s
    command: sh -c "chmod +x gradlew && ./gradlew bootRun --no-daemon"

  homelab-frontend-dev:
    image: node:20-alpine
    container_name: homelab-frontend-dev
    working_dir: /app
    volumes:
      - ./homelab-frontend:/app
      - /app/node_modules
    ports:
      - "80:80"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - homelab-backend-dev
    networks:
      - homelab-network

networks:
  homelab-network:
    name: homelab-network

volumes:
  gradle-cache:
